name: Workflow security (zizmor)

# Static analysis of our own GitHub Actions workflows — catches credential
# persistence, excessive permissions, template injection, and cache poisoning
# in the CI/release pipeline (the OIDC publish path is the crown-jewel risk).
# Findings surface in the Security tab as SARIF.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
