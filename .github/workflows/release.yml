name: Release

# Tag-triggered publish with build provenance via npm trusted publishing (OIDC).
# No npm token: the package's Trusted Publisher config on npmjs.com authorizes
# this repo + workflow, and npm attaches a Sigstore provenance attestation
# automatically (npm CLI >= 11.5.1). Verify with `npm audit signatures`.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # OIDC token for trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Use Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Generate CycloneDX SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm@4.2.1 --output-format JSON --output-file sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom.cdx.json

      - name: Publish to npm (provenance via trusted publishing)
        run: npm publish
