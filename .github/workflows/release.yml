name: Release

# Tag-triggered publish with build provenance via npm trusted publishing (OIDC).
# No npm token: the package's Trusted Publisher config on npmjs.com authorizes
# this repo + workflow, and npm attaches a Sigstore provenance attestation
# automatically (npm CLI >= 11.5.1). Verify with `npm audit signatures`.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # OIDC: trusted publishing + npm provenance + SBOM attestation signing
  attestations: write # store the signed CycloneDX SBOM attestation

# Serialize releases on the same tag: two pushes in quick succession can't race
# into a double-publish (the second would red-fail on "version already exists").
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Use Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false # never cache in a release build (npm trusted-publishing docs)

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package lint (publint + attw)
        run: npm run lint:pkg

      - name: Generate CycloneDX SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm@4.2.1 --output-format JSON --output-file sbom.cdx.json

      # Deterministic npm tarball — the SBOM-attestation subject. npm tarballs are
      # reproducible, so this digest matches the artifact `npm publish` uploads
      # below; we still publish from the directory so prepublishOnly gates run.
      - name: Pack tarball (SBOM attestation subject)
        id: pack
        run: echo "tarball=$(npm pack --silent)" >> "$GITHUB_OUTPUT"

      - name: Attest CycloneDX SBOM (signed, verifiable)
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.0 (attest-sbom is deprecated)
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}
          predicate-type: 'https://cyclonedx.org/bom'
          predicate-path: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom.cdx.json

      - name: Publish to npm (explicit provenance via trusted publishing)
        run: npm publish --provenance
